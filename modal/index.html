<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Modal Window</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <button class="open">詳細を見る</button>

  <div class="overlay hidden">
    <div class="modal">
      <p>これはモーダルウィンドウです。</p>
      <button class="close">閉じる</button>
    </div>
  </div>
  
  <script src="main.js"></script>
</body>
</html>
